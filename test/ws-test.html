<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WebSocket 연결 테스트</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
  h2   { color: #569cd6; }
  #log { background: #252526; border: 1px solid #444; padding: 10px; height: 300px;
         overflow-y: auto; white-space: pre-wrap; }
  .ok  { color: #4ec9b0; }
  .err { color: #f44747; }
  .rx  { color: #9cdcfe; }
  button { background: #0e639c; color: #fff; border: none; padding: 8px 16px;
           margin: 4px; cursor: pointer; border-radius: 3px; }
  button:hover { background: #1177bb; }
  input { background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
          padding: 6px; width: 300px; border-radius: 3px; }
</style>
</head>
<body>
<h2>WebSocket 연결 테스트 — ws://localhost:7778/ws</h2>

<div>
  <input id="url" value="ws://localhost:7778/ws" />
  <button onclick="connect()">연결</button>
  <button onclick="disconnect()">해제</button>
</div>
<br>
<div id="log"></div>

<script>
let ws = null;

function log(msg, cls = '') {
  const div = document.getElementById('log');
  const line = document.createElement('span');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function connect() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    log('이미 연결되어 있습니다.', 'err');
    return;
  }
  const url = document.getElementById('url').value;
  log(`연결 시도: ${url}`);
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    log('연결 성공 (WebSocket 핸드셰이크 완료)', 'ok');
  };

  ws.onclose = (e) => {
    log(`연결 종료 (code=${e.code}, reason="${e.reason}")`, 'err');
    ws = null;
  };

  ws.onerror = (e) => {
    log('WebSocket 오류 발생', 'err');
    console.error(e);
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      const bytes = new Uint8Array(e.data);
      log(`수신 (binary ${bytes.length}bytes): [${Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join(' ')}]`, 'rx');
    } else {
      log(`수신 (text): ${e.data}`, 'rx');
    }
  };
}

function disconnect() {
  if (!ws) { log('연결되어 있지 않습니다.', 'err'); return; }
  ws.close(1000, 'user disconnect');
  log('연결 해제 요청...');
}
</script>
</body>
</html>
