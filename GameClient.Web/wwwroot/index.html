<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DhNet RPG</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ──────────────────────────────────────────────────── -->
<!-- 로그인 / 등록 화면                                    -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-login" class="panel hidden">
  <h2>⚔ DhNet RPG</h2>

  <div class="tab-btns">
    <button id="tab-login"    class="active" onclick="switchTab('login')">로그인</button>
    <button id="tab-register"              onclick="switchTab('register')">계정 생성</button>
  </div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="form-group">
      <label>아이디</label>
      <input id="login-user" type="text" placeholder="아이디 (4~16자)" maxlength="16"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input id="login-pass" type="password" placeholder="비밀번호 (4~16자)" maxlength="16"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <div style="text-align:right;margin-top:8px">
      <a href="#" style="font-size:0.8rem;color:#a8dadc;text-decoration:none"
         onclick="showForgotPassword();return false;">비밀번호를 잊으셨나요?</a>
    </div>
  </div>

  <!-- 등록 폼 -->
  <div id="form-register" class="hidden">
    <div class="form-group">
      <label>아이디</label>
      <input id="reg-user" type="text" placeholder="아이디 (4~16자)" maxlength="16"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input id="reg-pass" type="password" placeholder="비밀번호 (4~16자)" maxlength="16"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>
    <div class="form-group">
      <label>이메일 <span class="label-hint">(선택)</span></label>
      <input id="reg-email" type="text" placeholder="비밀번호 재설정용 이메일" maxlength="255"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>
    <button class="btn-primary" onclick="doRegister()">계정 생성</button>
  </div>

  <div id="login-status" class="status-msg"></div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 로비 화면                                            -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-lobby" class="panel hidden">
  <div class="lobby-header">
    <h2>🏰 로비</h2>
    <span id="lobby-username" style="color:#a8dadc;font-size:0.9rem"></span>
  </div>

  <h3>방 목록</h3>
  <div id="room-list"></div>

  <div class="lobby-actions">
    <button class="btn-primary" onclick="createRoom()">새 방 만들기</button>
    <button class="btn-secondary" onclick="requestLobbyRoomList()">새로고침</button>
  </div>
  <div id="lobby-status" class="status-msg"></div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 룸 대기실 화면                                        -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-room" class="panel hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2>🚪 대기실</h2>
    <span id="room-id-label" style="color:#a0a0b0;font-size:0.85rem"></span>
  </div>

  <h3>참가자 (최대 2인)</h3>
  <div id="room-players"></div>

  <div class="room-actions">
    <button id="btn-ready" class="btn-success" onclick="toggleReady()">준비</button>
    <button class="btn-secondary" onclick="exitRoom()">나가기</button>
  </div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 게임 화면                                            -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-game" class="hidden">
  <div id="game-hud">
    <div class="hud-stat">👤 <span id="hud-name">-</span></div>
    <div class="hud-stat">Lv.<span id="hud-level">1</span></div>
    <div class="hud-stat">❤ <span id="hud-hp">-</span></div>
    <div class="hud-stat">EXP <span id="hud-exp">-</span></div>
    <div class="hud-stat">ATK <span id="hud-atk">-</span></div>
    <div class="hud-stat">DEF <span id="hud-def">-</span></div>
    <div class="hud-stat" style="color:#f1c40f">🌊 <span id="hud-wave">Wave 0</span></div>
    <div class="hud-stat" style="color:#3498db">⏱ <span id="hud-survival">00:00</span></div>
    <div class="hud-stat" style="color:#60a5fa">SPD <span id="hud-speed">300</span></div>
    <div class="hud-stat" style="color:#a8e063">💎 <span id="hud-gem-r">0</span>px</div>
  </div>

  <div id="wave-banner" style="position:absolute;top:60px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.7);color:#f1c40f;font-size:1.4rem;font-weight:bold;
    padding:8px 24px;border-radius:8px;pointer-events:none;opacity:0;
    transition:opacity 0.4s;z-index:10"></div>

  <div style="position:relative;width:800px;height:600px">
    <div id="weapon-choice-overlay" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;
      justify-content:center;z-index:20;gap:16px;">
      <div style="color:#f1c40f;font-size:1.3rem;font-weight:bold">레벨업! 무기를 선택하세요</div>
      <div id="weapon-choice-list" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center"></div>
    </div>

    <canvas id="game-canvas" width="800" height="600"></canvas>
  </div>

  <div id="game-chat-area">
    <div id="chat-log"></div>
    <input id="chat-input" type="text" placeholder="채팅 입력 (Enter)" maxlength="200"
           onkeydown="if(event.key==='Enter') sendGameChat()">
  </div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 결과 화면                                            -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-result" class="panel hidden">
  <div id="result-title" class="result-title">결과</div>

  <div style="text-align:center;margin:20px 0;color:#a8dadc;">
    <div style="margin-bottom:8px">최종 레벨: <strong id="result-level">-</strong></div>
    <div style="margin-bottom:8px">누적 EXP: <strong id="result-exp">-</strong></div>
    <div style="margin-bottom:8px;color:#f1c40f"><strong id="result-survived">생존 시간: -</strong></div>
    <div style="color:#e67e22"><strong id="result-wave">도달 웨이브: -</strong></div>
  </div>

  <button class="btn-primary" onclick="backToLobby()">로비로 돌아가기</button>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 비밀번호 찾기 화면                                    -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-forgot-password" class="panel hidden">
  <h2>🔑 비밀번호 찾기</h2>
  <p style="font-size:0.85rem;color:#aaa;margin-bottom:16px">
    가입 시 등록한 아이디와 이메일을 입력하면 재설정 링크를 보내드립니다.
  </p>
  <div class="form-group">
    <label>아이디</label>
    <input id="forgot-user" type="text" placeholder="아이디" maxlength="16"
           onkeydown="if(event.key==='Enter') doForgotPassword()">
  </div>
  <div class="form-group">
    <label>이메일</label>
    <input id="forgot-email" type="text" placeholder="가입 시 등록한 이메일" maxlength="255"
           onkeydown="if(event.key==='Enter') doForgotPassword()">
  </div>
  <button class="btn-primary" onclick="doForgotPassword()">재설정 링크 발송</button>
  <div id="forgot-status" class="status-msg" style="margin-top:12px"></div>
  <div style="text-align:center;margin-top:16px">
    <a href="#" style="font-size:0.85rem;color:#a8dadc;text-decoration:none"
       onclick="showScreen('login');return false;">← 로그인으로 돌아가기</a>
  </div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 비밀번호 재설정 화면 (이메일 링크로 진입)             -->
<!-- ──────────────────────────────────────────────────── -->
<div id="screen-reset-password" class="panel hidden">
  <h2>🔒 새 비밀번호 설정</h2>
  <div class="form-group">
    <label>새 비밀번호</label>
    <input id="reset-pass" type="password" placeholder="새 비밀번호 (4~16자)" maxlength="16"
           onkeydown="if(event.key==='Enter') doResetPassword()">
  </div>
  <button class="btn-primary" onclick="doResetPassword()">비밀번호 변경</button>
  <div id="reset-status" class="status-msg" style="margin-top:12px"></div>
</div>

<!-- ──────────────────────────────────────────────────── -->
<!-- 스크립트                                              -->
<!-- ──────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
<script src="/js/game.js"></script>

</body>
</html>
