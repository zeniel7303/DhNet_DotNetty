syntax = "proto3";
package dhnet;
option csharp_namespace = "GameServer.Protocol";

// 로비는 룸 허브 역할만 담당한다 — 로비 채팅 없음

message ReqRoomList { }

message RoomInfo {
  uint64 room_id      = 1;
  int32  player_count = 2;
  int32  max_players  = 3;
  bool   is_started   = 4;
}

message ResRoomList { repeated RoomInfo rooms = 1; }

message ReqCreateRoom { }
// ReqCreateRoom 응답은 ResRoomEnter (room.proto) 로 통합
