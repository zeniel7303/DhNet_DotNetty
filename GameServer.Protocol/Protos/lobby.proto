syntax = "proto3";
package dhnet;
option csharp_namespace = "GameServer.Protocol";

message ReqLobbyChat {
  string message = 1;
}

message NotiLobbyChat {
  uint64 player_id   = 1;
  string player_name = 2;
  string message     = 3;
}

// 로비 목록 조회
message ReqLobbyList { }

message LobbyInfo {
  uint64 lobby_id     = 1;
  int32  player_count = 2;
  int32  max_capacity = 3;
  bool   is_full      = 4;
}

message ResLobbyList {
  repeated LobbyInfo lobbies = 1;
}
