syntax = "proto3";
package dhnet;
option csharp_namespace = "GameServer.Protocol";

import "Protos/error_codes.proto";

// Client → Server: WASD 입력 기반 이동 (위치 대신 입력을 전송)
message ReqMove {
    uint32 seq    = 1;  // 클라이언트 시퀀스 번호 (단조 증가)
    uint32 flags  = 2;  // bit0=W, bit1=S, bit2=A, bit3=D
    uint32 dt_ms  = 3;  // 마지막 전송 이후 경과 시간(ms)
}

// Server → Client: 권위 위치 + 처리된 seq (자신에게만 ack_seq 의미 있음)
message NotiMove {
    uint64 player_id = 1;
    float  x         = 2;
    float  y         = 3;
    uint32 ack_seq   = 4;
}

message NotiEnterGame    {
    uint64 player_id   = 1;
    string player_name = 2;
    float  x           = 3;
    float  y           = 4;
    int32  level       = 5;
    int32  hp          = 6;
    int32  max_hp      = 7;
}
message NotiLeaveGame    { uint64 player_id = 1; }

message NotiSpawnMonster   { uint64 monster_id = 1; int32 monster_type = 2; float x = 3; float y = 4; int32 hp = 5; int32 max_hp = 6; }
message NotiDespawnMonster { uint64 monster_id = 1; }

message PlayerInfo  { uint64 player_id = 1; string name = 2; float x = 3; float y = 4; int32 level = 5; int32 hp = 6; int32 max_hp = 7; }
message MonsterInfo { uint64 monster_id = 1; int32 monster_type = 2; float x = 3; float y = 4; int32 hp = 5; int32 max_hp = 6; }

message ResEnterGame {
    repeated PlayerInfo  players  = 1;
    repeated MonsterInfo monsters = 2;
    ErrorCode            error_code = 3;
}

message MonsterMoveInfo { uint64 monster_id = 1; float x = 2; float y = 3; }
message NotiMonsterMove  { repeated MonsterMoveInfo moves = 1; }
